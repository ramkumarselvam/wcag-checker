<!DOCTYPE html>
<html>
<body>
<canvas id="c128" width="128" height="128"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c16" width="16" height="16"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  
  // Background - rounded square
  const r = s * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  
  // Gradient background
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#1e40af');  // blue-800
  grad.addColorStop(1, '#3b82f6');  // blue-500
  ctx.fillStyle = grad;
  ctx.fill();
  
  // Checkmark
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = s * 0.09;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(s * 0.22, s * 0.50);
  ctx.lineTo(s * 0.42, s * 0.70);
  ctx.lineTo(s * 0.78, s * 0.30);
  ctx.stroke();
  
  // "A" for accessibility - bottom right area hint
  // Small circle with "A"
  if (s >= 48) {
    ctx.fillStyle = '#fbbf24'; // amber-400
    ctx.beginPath();
    ctx.arc(s * 0.75, s * 0.75, s * 0.16, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#1e40af';
    ctx.font = `bold ${s * 0.18}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('A', s * 0.75, s * 0.76);
  }
}

[128, 48, 16].forEach(size => {
  const c = document.getElementById('c' + size);
  drawIcon(c);
  // Output as data URL
  const link = document.createElement('a');
  link.download = 'icon-' + size + '.png';
  link.href = c.toDataURL('image/png');
  link.textContent = 'Download ' + size;
  document.body.appendChild(link);
  document.body.appendChild(document.createElement('br'));
});
</script>
</body>
</html>
